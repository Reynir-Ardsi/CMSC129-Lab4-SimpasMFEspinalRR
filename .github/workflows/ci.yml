name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        
    - name: Install server dependencies
      working-directory: ./server
      run: npm install
      
    - name: Run Unit & Integration Tests (Server)
      working-directory: ./server
      run: npm test
