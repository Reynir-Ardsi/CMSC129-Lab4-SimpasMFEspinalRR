name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        
    - name: Install server dependencies
      working-directory: ./server
      run: npm install
      
    - name: Run Unit & Integration Tests (Server)
      working-directory: ./server
      run: npm test

  system-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install server dependencies
      working-directory: ./server
      run: npm install

    - name: Install client dependencies
      working-directory: ./client
      run: npm install
      
    - name: Install Playwright Browsers
      working-directory: ./client
      run: npx playwright install --with-deps chromium

    - name: Start Server
      working-directory: ./server
      run: npm start &

    - name: Start Client
      working-directory: ./client
      run: npm run dev &

    - name: Wait for services
      run: |
        echo "Waiting for backend..."
        for i in $(seq 1 30); do curl -s http://localhost:3001/notes > /dev/null 2>&1 && break || sleep 1; done
        echo "Waiting for frontend..."
        for i in $(seq 1 30); do curl -s http://localhost:5173 > /dev/null 2>&1 && break || sleep 1; done
        echo "Services ready!"

    - name: Run System Tests
      working-directory: ./client
      run: npx playwright test
